  - 异常

naming:
  single_keep_original: true
  single_template: "{seq}-{clean_original_name}"
  merged_template: "{seq_range}-{category}-{orders}单-{quantity}个"
  custom_text: ""
  merge_name: ""

inner_folder_naming:
  template: "{seq}-{original_name}"

sequence:
  enabled: true
  scope: all_extracted_folders
  sort_by: name
  merged_range_style: min_max
  priority_keywords: []
  include_keywords: []
  exclude_keywords: []

quantity_detection:
  source: outer_folder_name_only

conflict:
  target_exists: skip

already_processed:
  enabled: true
  action: skip
  patterns:
    - '^\d+~\d+-(?:\d{4}|未知日期|\d{4}-\d{4})-.+-\d+单-\d+个$'
    - '^\d+~\d+-.+-\d+单-\d+个$'

fallback:
  unknown_date: "未知日期"
  unknown_category: "未知产品"
  default_orders_per_folder: 1
  default_quantity_per_order: 1
